github:
  appId: 123456
  organization: your-org
  privateKeyPath: ~/.config/ephemeral-action-runner/github-app.pem
  apiBaseUrl: https://api.github.com
  webBaseUrl: https://github.com

image:
  sourceImage: work/images/ubuntu-24.04-clean.rootfs.tar
  outputImage: work/images/epar-ubuntu-24-wsl-web-e2e.tar
  upstreamDir: third_party/runner-images
  upstreamLock: third_party/runner-images.lock
  runnerVersion: latest
  customInstallScripts:
    - scripts/guest/ubuntu/install-web-e2e.sh

pool:
  minIdle: 2
  maxInstances: 2
  namePrefix: epar-wsl-web
  logDir: work/logs

runner:
  labels: [self-hosted, linux, X64, epar-wsl-ubuntu-24.04-web-e2e]
  ephemeral: true

provider:
  type: wsl
  sourceImage: work/images/epar-ubuntu-24-wsl-web-e2e.tar
  network: default
  installRoot: work/wsl

docker:
  registryMirrors:
    # - https://mirror.example.test

timeouts:
  bootSeconds: 180
  githubOnlineSeconds: 180
  commandSeconds: 900
