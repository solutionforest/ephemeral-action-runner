github:
  appId: 123456
  organization: your-org
  privateKeyPath: ~/.config/ephemeral-action-runner/github-app.pem
  apiBaseUrl: https://api.github.com
  webBaseUrl: https://github.com

image:
  sourceType: docker-image
  sourceImage: ghcr.io/catthehacker/ubuntu:act-latest
  outputImage: epar-docker-dind-catthehacker-ubuntu-web-e2e
  upstreamDir: third_party/runner-images
  upstreamLock: third_party/runner-images.lock
  runnerVersion: latest
  # Existing configs stay disabled. Set overlay to add the host's trusted root
  # anchors to Ubuntu runners. Windows/macOS: [system, user]; Linux: [system].
  hostTrustMode: disabled
  hostTrustScopes: [system]
  customInstallScripts:
    - scripts/guest/ubuntu/install-web-e2e.sh

pool:
  instances: 1
  # Must be unique for this machine/config within the GitHub organization.
  namePrefix: CHANGE-ME-unique-machine-prefix
  replacementRetryInitialSeconds: 15
  replacementRetryMaxSeconds: 1800
  replacementRetryMultiplier: 2
  replacementRetryJitterPercent: 20
logging:
  directory: work/logs
  managerSinks: [console]
  managerConsoleFormat: text
  managerConsoleTextFormat: "{time} [{level}] {message}"
  managerFileFormat: json
  transcriptSinks: [file]
  transcriptConsoleFormat: text
  maxFileSizeMiB: 100
  maxBackups: 3
  compressBackups: true
  retentionEnabled: true
  retentionMaxTotalMiB: 1024
  managerMaxAgeDays: 14
  instanceMaxAgeDays: 14
  buildMaxAgeDays: 14
  errorMaxAgeDays: 30
  benchmarkMaxAgeDays: 90
  retentionIntervalMinutes: 60

runner:
  labels: [self-hosted, linux, epar-docker-dind-catthehacker-ubuntu-web-e2e]
  includeHostLabel: true
  ephemeral: true

provider:
  type: docker-dind
  sourceImage: epar-docker-dind-catthehacker-ubuntu-web-e2e
  network: default

docker:
  registryMirrors:
    # - http://host.docker.internal:5050

timeouts:
  bootSeconds: 180
  githubOnlineSeconds: 180
  commandSeconds: 900
