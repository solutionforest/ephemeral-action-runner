github:
  appId: 123456
  organization: your-org
  privateKeyPath: ~/.config/ephemeral-action-runner/github-app.pem
  apiBaseUrl: https://api.github.com
  webBaseUrl: https://github.com

image:
  sourceType: docker-image
  sourceImage: ghcr.io/catthehacker/ubuntu:act-latest@sha256:2362bb12b0c61438d334b9ed3686809981796a864ab89d93b5ee657652774eb7
  sourcePlatform: linux/amd64
  outputImage: epar-ci-core
  upstreamDir: third_party/runner-images
  upstreamLock: third_party/runner-images.lock
  runnerVersion: latest
  # Existing configs stay disabled. Set overlay to add the host's trusted root
  # anchors to Ubuntu runners. Windows/macOS: [system, user]; Linux: [system].
  hostTrustMode: disabled
  hostTrustScopes: [system]
  customInstallScripts:

pool:
  instances: 1
  namePrefix: epar-ci-core
  logDir: work/logs

runner:
  group: epar-ci-canary
  labels: [epar-core-CHANGE-ME]
  includeHostLabel: false
  noDefaultLabels: true
  ephemeral: true

provider:
  type: docker-dind
  sourceImage: epar-ci-core
  network: default
  platform: linux/amd64

docker:
  registryMirrors:

timeouts:
  bootSeconds: 180
  githubOnlineSeconds: 180
  commandSeconds: 900
