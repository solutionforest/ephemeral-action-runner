github:
  appId: 123456
  organization: your-org
  privateKeyPath: ~/.config/ephemeral-action-runner/github-app.pem
  apiBaseUrl: https://api.github.com
  webBaseUrl: https://github.com

image:
  sourceType: rootfs-tar
  sourceImage: work/images/ubuntu-24.04-clean.rootfs.tar
  outputImage: work/images/epar-ubuntu-24-wsl.tar
  upstreamDir: third_party/runner-images
  upstreamLock: third_party/runner-images.lock
  runnerVersion: latest
  customInstallScripts:
    # - examples/custom-install/install-extra-apt-tools.sh

pool:
  instances: 1
  # Must be unique for this machine/config within the GitHub organization.
  namePrefix: CHANGE-ME-unique-machine-prefix
  logDir: work/logs

runner:
  labels: [self-hosted, linux, X64, epar-wsl-ubuntu-24.04-base]
  includeHostLabel: true
  ephemeral: true

provider:
  type: wsl
  sourceImage: work/images/epar-ubuntu-24-wsl.tar
  network: default
  installRoot: work/wsl

docker:
  registryMirrors:
    # - https://mirror.example.test

timeouts:
  bootSeconds: 180
  githubOnlineSeconds: 180
  commandSeconds: 900
