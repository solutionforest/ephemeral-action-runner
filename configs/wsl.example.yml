github:
  appId: 123456
  organization: your-org
  privateKeyPath: ~/.config/ephemeral-action-runner/github-app.pem
  apiBaseUrl: https://api.github.com
  webBaseUrl: https://github.com

image:
  sourceType: docker-image
  sourceImage: gitea/runner-images:ubuntu-latest-full
  sourcePlatform: linux/amd64
  outputImage: work/images/epar-wsl-gitea-ubuntu.tar
  upstreamDir: third_party/runner-images
  upstreamLock: third_party/runner-images.lock
  runnerVersion: latest
  customInstallScripts:
    # - examples/custom-install/install-extra-apt-tools.sh

pool:
  minIdle: 2
  maxInstances: 2
  namePrefix: epar-wsl
  logDir: work/logs

runner:
  labels: [self-hosted, linux, X64, epar-wsl-gitea-ubuntu]
  ephemeral: true

provider:
  type: wsl
  sourceImage: work/images/epar-wsl-gitea-ubuntu.tar
  network: default
  installRoot: work/wsl

docker:
  registryMirrors:
    # - https://mirror.example.test

timeouts:
  bootSeconds: 180
  githubOnlineSeconds: 180
  commandSeconds: 900
