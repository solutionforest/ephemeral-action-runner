github:
  appId: 123456
  organization: your-org
  privateKeyPath: ~/.config/ephemeral-action-runner/github-app.pem
  apiBaseUrl: https://api.github.com
  webBaseUrl: https://github.com

image:
  sourceImage: ghcr.io/cirruslabs/ubuntu:latest
  outputImage: epar-ubuntu-24-arm64-web-e2e
  upstreamDir: third_party/runner-images
  upstreamLock: third_party/runner-images.lock
  runnerVersion: latest
  customInstallScripts:
    - scripts/guest/ubuntu/install-web-e2e.sh

pool:
  minIdle: 2
  maxInstances: 2
  namePrefix: epar-tart-web
  logDir: work/logs

runner:
  labels: [self-hosted, linux, ARM64, epar-tart-ubuntu-24.04-web-e2e, epar-tart-rosetta-amd64]
  ephemeral: true

provider:
  type: tart
  sourceImage: epar-ubuntu-24-arm64-web-e2e
  network: default
  rosettaTag: rosetta

timeouts:
  bootSeconds: 180
  githubOnlineSeconds: 180
  commandSeconds: 900
